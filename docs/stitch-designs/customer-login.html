<body class="bg-background font-body text-on-surface min-h-screen">
<!-- Top AppBar Component (Execution from JSON) -->
<header class="fixed top-0 w-full z-50 flex items-center justify-between px-4 h-16 w-full bg-transparent">
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-white/10 scale-95 transition-transform text-white">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline font-bold text-lg text-white">Chào mừng</h1>
<div class="w-10"></div> <!-- Spacer for center alignment -->
</header>
<!-- Hero Section (1/3 of screen) -->
<section class="hero-gradient h-[353px] w-full flex flex-col items-center justify-center text-center px-6 pt-16">
<div class="w-20 h-20 bg-white rounded-full flex items-center justify-center mb-4 shadow-xl">
<span class="text-primary font-headline font-bold text-4xl">L</span>
</div>
<h2 class="font-headline font-bold text-[24px] text-white leading-tight">Loyalty Platform</h2>
<p class="text-[14px] text-white/80 mt-2">Tích điểm - Đổi quà - Nhận ưu đãi</p>
</section>
<!-- Form Card Container -->
<main class="px-5 -mt-10 relative z-10 mb-12">
<div class="bg-white rounded-3xl p-6 shadow-2xl">
<!-- Tabs Toggle -->
<div class="flex items-center mb-8 border-b border-surface-container-high">
<div class="flex-1 text-center pb-3 border-b-2 border-primary">
<span class="font-headline font-bold text-primary">Đăng nhập</span>
</div>
<div class="flex-1 text-center pb-3">
<span class="font-headline font-medium text-on-surface-variant">Đăng ký</span>
</div>
</div>
<div class="mb-6">
<p class="text-on-surface-variant font-medium text-base">Chào mừng quay lại!</p>
</div>
<!-- Login Form -->
<form class="space-y-5" onsubmit="return false;">
<!-- Phone Input -->
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-xl" data-icon="smartphone">smartphone</span>
</div>
<input class="block w-full pl-10 pr-3 py-3.5 bg-surface-container-low border border-outline-variant rounded-xl focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all placeholder:text-outline-variant" placeholder="0987 654 321" type="tel"/>
</div>
<!-- Password Input -->
<div class="space-y-2">
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-xl" data-icon="lock">lock</span>
</div>
<input class="block w-full pl-10 pr-10 py-3.5 bg-surface-container-low border border-outline-variant rounded-xl focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all placeholder:text-outline-variant" placeholder="••••••••" type="password"/>
<div class="absolute inset-y-0 right-0 pr-3 flex items-center cursor-pointer">
<span class="material-symbols-outlined text-outline text-xl" data-icon="visibility">visibility</span>
</div>
</div>
<div class="flex justify-end">
<a class="text-primary text-sm font-medium hover:underline" href="#">Quên mật khẩu?</a>
</div>
</div>
<!-- Primary Login Button -->
<button class="btn-gradient w-full py-4 rounded-xl text-white font-headline font-bold text-base shadow-lg shadow-primary/20 active:scale-[0.98] transition-transform" type="submit">
                    Đăng nhập
                </button>
<!-- Divider -->
<div class="relative flex items-center py-2">
<div class="flex-grow border-t border-outline-variant/30"></div>
<span class="flex-shrink mx-4 text-outline-variant text-sm font-medium">hoặc</span>
<div class="flex-grow border-t border-outline-variant/30"></div>
</div>
<!-- Google Login Button -->
<button class="w-full flex items-center justify-center space-x-3 py-3.5 px-4 bg-white border border-primary rounded-xl text-primary font-medium hover:bg-primary/5 active:scale-[0.98] transition-all" type="button">
<img alt="Google" class="w-5 h-5" data-alt="Google company logo with multi-colored clean minimalist icon design" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDHKQDYOB7OaWXeqLdrBMIW1eiBAH-T6YhFcLVwZOIaBR1BFbX6Ui08d6bb3OEni9WwE7OerOa6HxQoxx4j4vAO-JN8fBYwpwyOVBI2sQhyupGC4HxYPqV361cebdoLyNxjP_lSvb8cL_q847njKgLuatc7SO3h2aXCeoXFz-ec9ASP12C1BFoTb7k5pRZCu8b0r97q4y9O67PNTYXbMCJQ1RLNAG-VusGx87X-jnjvFsc3WQOWTOiDBa-WzN4wljVXtW3Uydea6lU"/>
<span>Đăng nhập với Google</span>
</button>
</form>
</div>
<!-- Secondary Navigation/Prompt -->
<div class="mt-8 text-center">
<p class="text-on-surface-variant font-body">
                Chưa có tài khoản? 
                <a class="text-primary font-bold ml-1 hover:underline" href="#">Đăng ký ngay</a>
</p>
</div>
<!-- Footer -->
<footer class="mt-16 text-center px-8">
<p class="text-[10px] leading-relaxed text-outline">
                Bằng việc đăng nhập, bạn đồng ý với 
                <a class="underline" href="#">Điều khoản</a> &amp; 
                <a class="underline" href="#">Chính sách bảo mật</a>
</p>
</footer>
