services:
  postgres:
    image: postgres:15-alpine
    container_name: loyalty-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: loyalty
      POSTGRES_PASSWORD: loyalty_prod_pw_change_me
      POSTGRES_DB: loyalty
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    networks:
      - loyalty-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loyalty"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: loyalty-backend-prod
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://loyalty:loyalty_prod_pw_change_me@postgres:5432/loyalty
      JWT_SECRET: ${JWT_SECRET:-prod-jwt-secret-please-change-32plus-chars-v1}
      QR_HMAC_SECRET: ${QR_HMAC_SECRET:-prod-qr-hmac-secret-please-change-32plus-chars-v2}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
      REFRESH_TOKEN_EXPIRE_DAYS: 30
      ENVIRONMENT: production
      DEBUG: "false"
      ENABLE_SCHEDULER: "true"
      FRONTEND_ORIGINS: https://member.ecom-bill.com,https://merchant.ecom-bill.com,https://admin.ecom-bill.com,https://pos.ecom-bill.com
    volumes:
      - loyalty_uploads:/app/uploads
    networks:
      - loyalty-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api
    container_name: loyalty-frontend-prod
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: /api
      BACKEND_INTERNAL_URL: http://backend:8000
    ports:
      - "3199:3000"
    networks:
      - loyalty-net

networks:
  loyalty-net:
    name: loyalty-prod-net
    driver: bridge

volumes:
  postgres_prod_data:
    name: loyalty-prod-postgres-data
  loyalty_uploads:
    name: loyalty-prod-uploads
